name: Daily Outbreak Scraper

on:
  schedule:
    - cron: "0 7 * * *"   # 7am UTC daily
  workflow_dispatch:        # also allows manual trigger from GitHub UI

jobs:
  scrape:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repo (full history)
        uses: actions/checkout@v4
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0      # full history — required for rebase to work
          ref: main           # always use latest main

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: pip install anthropic feedparser requests

      - name: Run scraper
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scraper.py

      - name: Commit and push if data changed
        run: |
          set +e
          git config user.name  "EpiTrace Scraper"
          git config user.email "scraper@epitrace.bot"
          git add data/cases.json data/scraper_log.json data/scraper_seen.json
          git diff --cached --quiet
          DIFF_EXIT=$?
          if [ $DIFF_EXIT -eq 0 ]; then
            echo "No new cases found — nothing to commit"
            exit 0
          fi
          git commit -m "Auto-update: scraper found new case data $(date -u '+%Y-%m-%d %H:%M UTC')"
          echo "--- Remote state before push ---"
          git log --oneline origin/main -3
          echo "--- Local state ---"
          git log --oneline -3
          for i in 1 2 3 4 5; do
            echo "=== Push attempt $i ==="
            git fetch origin main
            git rebase origin/main
            git push origin main
            PUSH_EXIT=$?
            if [ $PUSH_EXIT -eq 0 ]; then
              echo "Push succeeded on attempt $i!"
              exit 0
            fi
            echo "Attempt $i failed (exit $PUSH_EXIT), waiting 10s..."
            sleep 10
          done
          echo "All 5 push attempts failed"
          exit 1
